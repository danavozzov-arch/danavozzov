<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заголовок страницы (заполните при необходимости)</title>
    <!-- Стили для страницы -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.1);
        }
        h1, h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #4a5568;
        }
        a {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s;
        }
        a:hover {
            color: #764ba2;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        label {
            font-weight: 600;
            color: #4a5568;
        }
        input[type="text"],
        input[type="password"],
        textarea {
            padding: 12px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus,
        input[type="password"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        input[type="submit"] {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        input[type="submit"]:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .links {
            text-align: center;
            margin-top: 20px;
        }
        .links a {
            margin: 0 10px;
        }
        .form-container {
            max-width: 400px;
            margin: 40px auto;
        }
    </style>
</head>
<body>
    <!-- Основная секция — главная страница сайта -->
    <div class="container">

        <!-- Заголовок главной страницы -->
        <h1>Добро пожаловать!</h1>

        <!-- Блок с ссылками на регистрацию и вход -->
        <div class="links">
            <a href="{{ url_for('register') }}">Регистрация</a> |
            <a href="{{ url_for('login') }}">Вход</a>
        </div>

        <!-- Ссылка для скачивания гида -->
        <div style="text-align: center; margin-top: 30px;">
            <a href="{{ url_for('download_guide') }}" class="btn">Скачать гид</a>
        </div>
    </div>

    <!-- Шаблоны для других страниц -->

    <!-- Форма регистрации -->
    <div class="form-container">
        <h2>Регистрация</h2>
        <form method="POST">
            <label for="username">Имя пользователя:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>
            <input type="submit" value="Зарегистрироваться">
        </form>
        <!-- Ссылка на страницу входа для пользователей с аккаунтом -->
        <div class="links">
            <a href="{{ url_for('login') }}">Уже есть аккаунт? Войти</a>
        </div>
    </div>

    <!-- Форма входа в систему -->
    <div class="form-container">
        <h2>Вход в систему</h2>
        <form method="POST">
            <label for="username">Имя пользователя:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Пароль:</label>
            <input type="password" id="password" name="password" required>
            <input type="submit" value="Войти">
        </form>
        <!-- Ссылка на регистрацию для новых пользователей -->
        <div class="links">
            <a href="{{ url_for('register') }}">Нет аккаунта? Зарегистрироваться</a>
        </div>
    </div>

    <!-- Личный кабинет: форма для сохранения данных -->
    <h2>Личный кабинет</h2>
    <form action="{{ url_for('save_data') }}" method="POST">
        <label for="data">Введите данные для сохранения:</label>
        <textarea name="data" id="data" rows="4" cols="50"></textarea>
        <input type="submit" value="Сохранить">
    </form>
    <!-- Ссылка для выхода из личного кабинета -->
    <div class="links">
        <a href="{{ url_for('logout') }}">Выйти</a>
    </div>
</body>
</html>
